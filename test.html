<!DOCTYPE html> 
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Video with Blurhash Placeholder</title>
    <style>
      /* Styles to position the video and placeholder correctly */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      .video-container {
        position: relative;
        width: 100%;
        height: 100vh; /* Adjust as needed */
        overflow: hidden;
      }

      .video-container video,
      .video-container canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .video-container video {
        opacity: 0;
        transition: opacity 0.7s;
      }
    </style>
  </head>
  <body>
    <!-- Video Container -->
    <div class="video-container">
      <!-- Blurhash Placeholder -->
      <canvas id="blurhash-canvas"></canvas>
      <!-- Video Element  -->
      <video
        autoplay
        muted
        loop
        playsinline
        onloadeddata="this.style.opacity = '0.5'; document.getElementById('blurhash-canvas').style.display = 'none';"
      >
        <source
          src="https://reshapeclub.com/assets/home.mov"
          type="video/mp4"
        />
      </video>
     
    </div>

    <!-- Include your Blurhash library with Rocket Loader disabled -->
    <script data-cfasync="false" src="js/blurhash_pure_js_port.min.js"></script>

    <!-- Your script without 'type="module"' -->
    <script>
      // Wait for the window to load completely
      window.addEventListener("load", function () {
        // Verify if 'blurhash' is defined
        console.log("blurhash:", blurhash);

        // Decode the Blurhash and render it on the canvas
        const blurhashString = "LEHV6nWB2yk8pyo0adR*.7kCMdnj";
        const canvas = document.getElementById("blurhash-canvas");
        const ctx = canvas.getContext("2d");

        // Get dimensions of the container
        const container = document.querySelector('.video-container');
        const rect = container.getBoundingClientRect();
        const width = canvas.width = rect.width;
        const height = canvas.height = rect.height;

        console.log('Canvas dimensions:', width, height);

        // Decode at a smaller size for performance, then scale up
        const decodeWidth = 32; // Adjust for decoding quality/performance
        const decodeHeight = 32;

        // Decode the Blurhash using the global 'blurhash' object
        const pixels = blurhash.decode(
          blurhashString,
          decodeWidth,
          decodeHeight
        );

        // Create ImageData and put it on the canvas
        const imageData = new ImageData(pixels, decodeWidth, decodeHeight);
        ctx.putImageData(imageData, 0, 0);

        // Scale the decoded image to fill the canvas
        ctx.drawImage(
          canvas,
          0,
          0,
          decodeWidth,
          decodeHeight,
          0,
          0,
          width,
          height
        );

        console.log("Blurhash decoding complete");
      });
    </script>
  </body>
</html>
